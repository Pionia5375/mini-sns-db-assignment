services:
  postgres:
    image: postgres:17-alpine
    container_name: db_assignment_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_password
      POSTGRES_DB: sns
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d sns"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
